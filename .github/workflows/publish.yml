name: Publish

on:
  workflow_call:

jobs:
  build-conda-package:
    name: Build conda package
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up pixi
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: v0.44.0
    - name: Get version from git
      id: version
      run: |
        VERSION=$(python -c "from setuptools_scm import get_version; print(get_version())")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Build conda package
      run: |
        pixi global install rattler-build
        VERSION=${{ steps.version.outputs.version }} rattler-build build --recipe conda.recipe/ --output-dir dist/
    - name: Upload the build artifact
      uses: actions/upload-artifact@v4
      with:
        name: conda-${{ github.sha }}
        path: dist/noarch/*.conda
        if-no-files-found: error
        retention-days: 7

  build-wheel:
    name: Build the wheel
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install build dependencies
      run: pip install build hatch-vcs
    - name: Build the package
      run: python -m build
    - name: Upload the build artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ github.sha }}
        path: dist/*
        if-no-files-found: error
        retention-days: 7

  check:
    name: Check all builds successful
    if: always()
    needs: [build-conda-package, build-wheel]
    runs-on: ubuntu-latest
    steps:
    - name: Decide whether all required jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}

  publish-conda-pkg-to-anaconda-dot-org:
    name: Publish conda package to Anaconda.org
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [check]
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download the build artifacts
      uses: actions/download-artifact@v4
      with:
        name: conda-${{ github.sha }}
        path: ./conda-bld
    - name: Setup conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-activate-base: true
        activate-environment: ""
    - name: Install anaconda-client
      run: conda install -y anaconda-client
    - name: Publish to anaconda.org
      env:
        TOKEN: ${{ secrets.ANACONDA_ORG_TOKEN }}
      run: |
        [[ "$GITHUB_REF" =~ ^refs/tags/v ]] || export LABEL="--label dev"
        anaconda --verbose \
          --token $TOKEN \
          upload \
          --user lembas-project \
          $LABEL \
          --force \
          ./conda-bld/*.conda

  publish-wheel-to-anaconda-dot-org:
    name: Publish wheel to Anaconda.org
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [check]
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download the build artifacts
      uses: actions/download-artifact@v4
      with:
        name: wheel-${{ github.sha }}
        path: ./dist
    - name: Setup conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-activate-base: true
        activate-environment: ""
    - name: Install anaconda-client
      run: conda install -y anaconda-client
    - name: Publish to anaconda.org
      env:
        TOKEN: ${{ secrets.ANACONDA_ORG_TOKEN }}
      run: |
        [[ "$GITHUB_REF" =~ ^refs/tags/v ]] || export LABEL="--label dev"
        anaconda --verbose \
          --token $TOKEN \
          upload \
          --user lembas-project \
          $LABEL \
          --force \
          ./dist/*.whl
